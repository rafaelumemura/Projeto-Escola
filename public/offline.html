<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#00b3af" />
    <title>Projeto Escola - sem conexão</title>
    <style>
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; box-sizing: border-box; background: #fff; color: #1d2320; font-family: Arial, sans-serif; }
      main { max-width: 420px; text-align: center; }
      img { display: block; width: min(280px, 80vw); margin: 0 auto 28px; }
      h1 { margin: 0; font-size: 24px; }
      p { margin: 12px 0 0; color: #66706b; line-height: 1.6; }
      button { margin-top: 22px; border: 0; border-radius: 6px; padding: 11px 18px; color: #fff; background: #00b3af; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo-horizontal.png" alt="Projeto Escola" />
      <h1>Você está sem conexão</h1>
      <p>Assim que a internet voltar, tente abrir esta página novamente.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
